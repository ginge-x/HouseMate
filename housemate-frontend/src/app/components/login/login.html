<div class="min-h-screen bg-white flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="bg-white shadow-sm border border-zinc-200 rounded-md p-8">
      <h1 class="text-3xl font-semibold text-center text-zinc-800">HouseMate</h1>

      <form class="mt-8 space-y-4" [formGroup]="form" (ngSubmit)="submit()">
        <div>
          <label class="block text-sm font-medium text-zinc-800">Email address</label>
          <input
            type="email"
            formControlName="email"
            placeholder="yourname@example.com"
            class="mt-1 w-full rounded-md border border-zinc-300 bg-white px-3 py-2 text-sm text-zinc-800 focus:outline-none focus:ring-2 focus:ring-zinc-700 focus:border-zinc-200"
          />
          <p
            *ngIf="form.get('email')?.touched && form.get('email')?.invalid"
            class="mt-1 text-xs text-zinc-800"
          >
            Please enter a valid email.
          </p>
        </div>

        <div>
          <label class="block text-sm font-medium text-zinc-800">Password</label>

          <div class="mt-1 relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              class="w-full rounded-md border border-zinc-300 bg-white px-3 py-2 pr-10 text-sm text-zinc-800 focus:outline-none focus:ring-2 focus:ring-zinc-700 focus:border-zinc-200"
            />
            <button
              type="button"
              (click)="showPassword = !showPassword"
              class="absolute inset-y-0 right-2 text-xs text-zinc-800 hover:text-zinc-800"
              aria-label="Toggle password visibility"
            >
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>

          <p
            *ngIf="form.get('password')?.touched && form.get('password')?.invalid"
            class="mt-1 text-xs text-zinc-800"
          >
            Password must be at least 6 characters.
          </p>
        </div>

        <button
          type="submit"
          [disabled]="loading || form.invalid"
          class="w-full rounded-md bg-zinc-800 text-white py-2 text-sm font-semibold hover:bg-zinc-700 disabled:opacity-60 disabled:cursor-not-allowed"
        >
          {{ loading ? 'Logging in…' : 'Log in' }}
        </button>

        <p *ngIf="error" class="text-sm text-zinc-800 text-center">{{ error }}</p>

        <p class="text-sm text-center text-zinc-800">
          Don’t have an account?
          <a routerLink="/register" class="font-medium text-zinc-800 hover:underline">Register</a>
        </p>
      </form>
    </div>
  </div>
</div>
