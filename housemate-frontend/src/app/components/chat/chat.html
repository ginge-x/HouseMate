<div class="max-w-5xl mx-auto p-4 sm:p-6 space-y-4">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold text-zinc-800">Household Chat</h1>

    <button
      class="px-3 py-2 rounded-md border border-zinc-300 bg-white text-sm text-zinc-800 hover:bg-zinc-100 disabled:opacity-60"
      (click)="loadInitial()"
      [disabled]="loading"
    >
      Refresh
    </button>
  </div>

  <div
    *ngIf="error"
    class="rounded-md border border-zinc-200 bg-white text-zinc-800 px-4 py-3 text-sm"
  >
    {{ error }}
  </div>

  <div
    #scrollBox
    class="rounded-md border border-zinc-200 bg-white h-[60vh] overflow-y-auto p-4 space-y-3"
  >
    <div *ngIf="loading" class="text-sm text-zinc-500">Loading chat…</div>
    <div *ngIf="!loading && messages.length === 0" class="text-sm text-zinc-500">
      No messages yet — say hi 
    </div>

    <div *ngFor="let m of messages" class="flex" [class.justify-end]="m.is_you">
      <div
        class="max-w-[80%] rounded-xl border px-3 py-2"
        [ngClass]="
          m.is_you
            ? 'bg-zinc-800 text-white border-zinc-800'
            : 'bg-white text-zinc-800 border-zinc-200'
        "
      >
        <div class="text-xs opacity-80 mb-1 flex gap-2 items-center">
          <span class="font-semibold">
            {{ m.is_you ? 'You' : m.email || 'Unknown' }}
          </span>
          <span>•</span>
          <span>{{ labelDate(m.created_at) }}</span>
        </div>
        <div class="text-sm whitespace-pre-wrap">{{ m.text }}</div>
      </div>
    </div>
  </div>

  <div class="rounded-md border border-zinc-200 bg-white p-3 flex gap-2 items-end">
    <textarea
      [(ngModel)]="draft"
      rows="2"
      placeholder="Type a message..."
      class="flex-1 rounded-md border border-zinc-300 bg-white px-3 py-2 text-sm text-zinc-800 focus:outline-none focus:ring-2 focus:ring-zinc-700 focus:border-zinc-200"
    ></textarea>

    <button
      class="rounded-md bg-zinc-800 text-white px-4 py-2 text-sm font-semibold hover:bg-zinc-700 disabled:opacity-60"
      (click)="send()"
      [disabled]="sending || !draft.trim()"
    >
      {{ sending ? 'Sending…' : 'Send' }}
    </button>
  </div>

  <div class="text-xs text-zinc-500">Tip: this chat updates every 2 seconds (polling).</div>
</div>
